name: Bug
description: Something on the live site or in the pipeline is broken
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual
      description: What happens instead — include console/CI output if relevant.
    validations:
      required: true
